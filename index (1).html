<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Career Portal | Apply Now</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      body {
        background-color: #f3f4f6;
        color: #1f2937;
      }

      .container {
        max-width: 1000px;
        margin: 0 auto;
        padding: 0 20px;
      }

      .apply_box {
        max-width: 650px;
        padding: 40px;
        background-color: #ffffff;
        margin: 6vh auto;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05), 0 4px 6px rgba(0, 0, 0, 0.02);
        border-radius: 12px;
      }

      h1 {
        font-size: 28px;
        color: #111827;
        margin-bottom: 10px;
      }

      .title_small {
        font-size: 18px;
        color: #6b7280;
        font-weight: 400;
      }

      .form_container {
        margin-top: 30px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 24px;
      }

      .form_control {
        display: flex;
        flex-direction: column;
      }

      label {
        font-size: 14px;
        font-weight: 600;
        color: #374151;
        margin-bottom: 8px;
      }

      input,
      select,
      textarea {
        padding: 12px 16px;
        border: 1.5px solid #d1d5db;
        border-radius: 8px;
        font-size: 15px;
        background-color: #f9fafb;
        transition: all 0.2s ease;
      }

      input:focus,
      select:focus,
      textarea:focus {
        outline: none;
        border-color: #4f46e5;
        background-color: #ffffff;
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
      }

      .button_container {
        display: flex;
        justify-content: flex-end;
        margin-top: 32px;
      }

      button {
        background-color: #4f46e5;
        border: none;
        padding: 12px 28px;
        font-size: 16px;
        font-weight: 600;
        color: white;
        border-radius: 8px;
        transition: all 0.2s ease;
        box-shadow: 0 4px 6px rgba(79, 70, 229, 0.25);
      }

      button:hover {
        background-color: #4338ca;
        transform: translateY(-2px);
        box-shadow: 0 6px 12px rgba(79, 70, 229, 0.3);
        cursor: pointer;
      }

      button:active {
        transform: translateY(0);
      }

      .textarea_control {
        grid-column: 1 / span 2;
      }

      .textarea_control textarea {
        width: 100%;
        resize: vertical;
      }

      #success_message {
        display: none;
        text-align: center;
        color: #065f46;
        padding: 30px;
        background: #ecfdf5;
        border-radius: 12px;
        margin-top: 20px;
      }

      @media (max-width: 500px) {
        .apply_box {
          padding: 25px 20px;
        }
        .textarea_control {
          grid-column: 1 / span 1;
        }
        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="apply_box">
        <h1>
          Job Application
          <span class="title_small">(Web)</span>
        </h1>
        
        <form id="job_form">
          <div class="form_container">
            <div class="form_control">
              <label for="first_name"> First Name </label>
              <input id="first_name" name="first_name" placeholder="John" required />
            </div>
            
            <div class="form_control">
              <label for="last_name"> Last Name </label>
              <input id="last_name" name="last_name" placeholder="Doe" required />
            </div>
            
            <div class="form_control">
              <label for="email"> Email </label>
              <input type="email" id="email" name="email" placeholder="example@email.com" required />
            </div>
            
            <div class="form_control">
              <label for="job_role"> Job Role </label>
              <select id="job_role" name="job_role" required>
                <option value="">Select Job Role</option>
                <option value="frontend">Frontend Developer</option>
                <option value="backend">Backend Developer</option>
                <option value="full_stack">Full Stack Developer</option>
                <option value="ui_ux">UI/UX Designer</option>
              </select>
            </div>
            
            <div class="textarea_control">
              <label for="address"> Address </label>
              <textarea id="address" name="address" rows="4" placeholder="Enter your full address" required></textarea>
            </div>
            
            <div class="form_control">
              <label for="city"> City </label>
              <input id="city" name="city" placeholder="e.g. New York" required />
            </div>
            
            <div class="form_control">
              <label for="pincode"> Pincode </label>
              <input type="number" id="pincode" name="pincode" placeholder="123456" required />
            </div>
            
            <div class="form_control">
              <label for="date"> Preferred Start Date </label>
              <input type="date" id="date" name="date" required />
            </div>
            
            <div class="form_control">
              <label for="upload"> Upload CV (PDF) </label>
              <input type="file" id="upload" name="upload" accept=".pdf" required />
            </div>
          </div>
          
          <div class="button_container">
            <button type="submit">Submit Application</button>
          </div>
        </form>

        <div id="success_message">
          <h2>Application Received</h2>
          <p>We've successfully received your application. Our team will contact you soon.</p>
        </div>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const form = document.getElementById("job_form");
        const dateInput = document.getElementById("date");
        const fileInput = document.getElementById("upload");
        const successMessage = document.getElementById("success_message");

        function setupDateInput() {
          const today = new Date().toISOString().split("T")[0];
          dateInput.value = today;
          dateInput.setAttribute("min", today);
        }

        function validateFile() {
          const file = fileInput.files[0];
          if (file) {
            const maxSize = 2 * 1024 * 1024;
            if (file.type !== "application/pdf") {
              alert("Please upload a PDF file.");
              fileInput.value = "";
              return false;
            }
            if (file.size > maxSize) {
              alert("File size must be under 2MB.");
              fileInput.value = "";
              return false;
            }
          }
          return true;
        }

        function handleFormSubmit(event) {
          event.preventDefault();
          form.style.display = "none";
          successMessage.style.display = "block";
        }

        setupDateInput();
        fileInput.addEventListener("change", validateFile);
        form.addEventListener("submit", handleFormSubmit);
      });
    </script>
  </body>
</html>
